<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y7CE✵</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Click to reveal overlay */
        .click-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .click-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .click-text {
            font-size: 13px;
            font-weight: 500;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 5px;
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        /* Banner - Full Screen */
        .banner-wrapper {
            width: 100%;
            height: 100vh;
            min-height: 600px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .banner-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            display: block;
            filter: blur(0px) brightness(0.45) saturate(0.9);
        }

        .banner-img {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            display: none;
            filter: blur(0px) brightness(0.45) saturate(0.9);
        }

        /* Noise texture overlay */
        .noise {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            z-index: 2;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        /* Floating particles */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: float-up linear infinite;
        }

        @keyframes float-up {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            15% {
                opacity: 0.6;
            }
            85% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* Scanline effect */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.04) 2px,
                rgba(0, 0, 0, 0.04) 4px
            );
            pointer-events: none;
            z-index: 4;
        }

        /* Vignette */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, transparent 35%, rgba(0,0,0,0.75) 100%);
            pointer-events: none;
            z-index: 3;
        }

        /* Banner content overlay */
        .banner-content {
            position: relative;
            z-index: 5;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            width: 100%;
            max-width: 500px;
        }

        /* Avatar */
        .avatar-wrapper {
            position: relative;
            margin-bottom: 24px;
            width: 130px;
            height: 130px;
        }

        .avatar-video {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.08);
            box-shadow: 0 0 50px rgba(255,255,255,0.06), 0 0 100px rgba(255,255,255,0.03);
            display: block;
            animation: avatar-glow 4s ease-in-out infinite;
        }

        .avatar-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.08);
            box-shadow: 0 0 50px rgba(255,255,255,0.06), 0 0 100px rgba(255,255,255,0.03);
            display: none;
            animation: avatar-glow 4s ease-in-out infinite;
        }

        @keyframes avatar-glow {
            0%, 100% { 
                box-shadow: 0 0 50px rgba(255,255,255,0.06), 0 0 100px rgba(255,255,255,0.03);
                border-color: rgba(255,255,255,0.08);
            }
            50% { 
                box-shadow: 0 0 70px rgba(255,255,255,0.12), 0 0 140px rgba(255,255,255,0.06);
                border-color: rgba(255,255,255,0.15);
            }
        }

        /* Status dot */
        .status-dot {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 18px;
            height: 18px;
            background: #3ba55d;
            border-radius: 50%;
            border: 3px solid #0a0a0a;
            z-index: 6;
            animation: status-blink 2.5s ease-in-out infinite;
        }

        @keyframes status-blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.85); }
        }

        /* Username */
        .username {
            font-size: 38px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: 6px;
            text-transform: uppercase;
            animation: text-shimmer 5s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(255,255,255,0.15);
        }

        @keyframes text-shimmer {
            0%, 100% { 
                text-shadow: 0 0 40px rgba(255,255,255,0.15), 0 0 80px rgba(255,255,255,0.05);
                letter-spacing: 10px;
                opacity: 0.9;
            }
            50% { 
                text-shadow: 0 0 50px rgba(255,255,255,0.3), 0 0 100px rgba(255,255,255,0.1);
                letter-spacing: 14px;
                opacity: 1;
            }
        }

        /* Location */
        .location {
            font-size: 12px;
            color: #555;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 4px;
            animation: fade-in-up 1s ease-out 0.3s both;
        }

        .location::before {
            content: "";
            display: inline-block;
            width: 5px;
            height: 5px;
            background: #555;
            border-radius: 50%;
            animation: dot-pulse 2.5s ease-in-out infinite;
        }

        @keyframes dot-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.6); opacity: 0.4; }
        }

        /* Social Links */
        .social-links {
            display: flex;
            gap: 14px;
            margin-bottom: 32px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fade-in-up 1s ease-out 0.5s both;
        }

        .social-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            color: #777;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.25s ease;
            backdrop-filter: blur(10px);
            min-width: 120px;
            justify-content: center;
        }

        .social-btn:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.15);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .social-btn svg {
            width: 15px;
            height: 15px;
            fill: currentColor;
            transition: transform 0.25s ease;
        }

        .social-btn:hover svg {
            transform: scale(1.15);
        }

        /* Music Player */
        .music-player {
            width: 100%;
            max-width: 400px;
            background: rgba(255,255,255,0.015);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 16px;
            backdrop-filter: blur(20px);
            animation: fade-in-up 1s ease-out 0.7s both;
        }

        .music-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .music-cover {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            background: #1a1a1a;
            object-fit: cover;
            animation: cover-spin 10s linear infinite paused;
            flex-shrink: 0;
        }

        .music-cover.playing {
            animation-play-state: running;
        }

        @keyframes cover-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .music-info {
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }

        .music-title {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-artist {
            font-size: 11px;
            color: #444;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .progress-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
            animation: shimmer 2.5s linear infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, rgba(255,255,255,0.8), rgba(255,255,255,0.3));
            border-radius: 2px;
            transition: width 0.1s linear;
            position: relative;
            z-index: 1;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #333;
            margin-top: 6px;
            font-variant-numeric: tabular-nums;
        }

        /* Controls */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .control-btn {
            background: none;
            border: none;
            color: #444;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            border-radius: 50%;
        }

        .control-btn:hover {
            color: #ccc;
            transform: scale(1.1);
        }

        .control-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .play-btn {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
        }

        .play-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.08);
            box-shadow: 0 0 25px rgba(255,255,255,0.08);
        }

        .play-btn svg {
            width: 22px;
            height: 22px;
        }

        /* Views */
        .views {
            font-size: 11px;
            color: #2a2a2a;
            margin-top: 8px;
            animation: fade-in-up 1s ease-out 0.9s both;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* Volume */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            justify-content: center;
        }

        .volume-slider {
            width: 90px;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(255,255,255,0.2);
            transition: transform 0.15s;
        }

        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.4);
        }

        /* Fade in animations */
        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Equalizer bars */
        .equalizer {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 18px;
            margin-left: auto;
            flex-shrink: 0;
            opacity: 0.2;
            transition: opacity 0.3s;
        }

        .equalizer.active {
            opacity: 0.6;
        }

        .eq-bar {
            width: 2px;
            background: linear-gradient(to top, rgba(255,255,255,0.6), transparent);
            border-radius: 1px;
            animation: eq-bounce 0.6s ease-in-out infinite alternate;
        }

        .eq-bar:nth-child(1) { height: 6px; animation-delay: 0s; }
        .eq-bar:nth-child(2) { height: 12px; animation-delay: 0.12s; }
        .eq-bar:nth-child(3) { height: 8px; animation-delay: 0.24s; }
        .eq-bar:nth-child(4) { height: 14px; animation-delay: 0.18s; }
        .eq-bar:nth-child(5) { height: 5px; animation-delay: 0.06s; }

        @keyframes eq-bounce {
            0% { transform: scaleY(0.3); opacity: 0.2; }
            100% { transform: scaleY(1); opacity: 0.8; }
        }

        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            animation: bounce 2.5s ease-in-out infinite;
            z-index: 5;
            opacity: 0.4;
            transition: opacity 0.5s;
        }

        .scroll-indicator span {
            font-size: 9px;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .scroll-arrow {
            width: 16px;
            height: 16px;
            border-right: 1.5px solid #333;
            border-bottom: 1.5px solid #333;
            transform: rotate(45deg);
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(8px); }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #1a1a1a;
            border-radius: 2px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #222;
        }

        .eq-bar:nth-child(4) { height: 14px; animation-delay: 0.18s; }
        .eq-bar:nth-child(5) { height: 5px; animation-delay: 0.06s; }

        @keyframes eq-bounce {
            0% { transform: scaleY(0.3); opacity: 0.2; }
            100% { transform: scaleY(1); opacity: 0.8; }
        }

        /* Corner Credit - OĞLUŞUM: YUSUF ATALAY */
        .corner-credit {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            z-index: 100;
            animation: corner-slide-in 1.2s ease-out 1.5s both, corner-pulse 3s ease-in-out infinite 2.7s;
            cursor: default;
            transition: all 0.3s ease;
        }

        .corner-credit:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }

        .credit-label {
            font-size: 10px;
            font-weight: 700;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: credit-flicker 4s ease-in-out infinite;
        }

        .credit-sep {
            font-size: 10px;
            color: #333;
            font-weight: 600;
        }

        .credit-name {
            font-size: 10px;
            display: none;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: credit-glow 3s ease-in-out infinite;
        }

        @keyframes corner-slide-in {
            from {
                opacity: 0;
                transform: translateX(40px) translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateX(0) translateY(0);
            }
        }

        @keyframes corner-pulse {
            0%, 100% { 
                border-color: rgba(255,255,255,0.08);
                box-shadow: 0 0 0 rgba(255,255,255,0);
            }
            50% { 
                border-color: rgba(255,255,255,0.15);
                box-shadow: 0 0 20px rgba(255,255,255,0.03);
            }
        }

        @keyframes credit-flicker {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
            75% { opacity: 0.8; }
        }

        @keyframes credit-glow {
            0%, 100% {

                text-shadow: 0 0 5px rgba(255,255,255,0.05);
            }
            50% {

        /* Mobile quote fix */

<!-- DOSYA ADLARI:
     banner.mp4 / banner.jpg = Arka plan video/resim

     cover.jpg = Müzik albüm kapağı
     Bu dosyaları kendi dosyalarınla değiştir, isimleri aynı kalacak şekilde. -->
    <audio id="bgAudio" loop preload="auto">
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Generate particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 40; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 12 + 6) + 's';
            particle.style.animationDelay = Math.random() * 6 + 's';
            particle.style.width = (Math.random() * 2 + 1) + 'px';
            particle.style.height = particle.style.width;
            particle.style.opacity = Math.random() * 0.4 + 0.1;
            particlesContainer.appendChild(particle);
        }

        // Elements
        const overlay = document.getElementById('clickOverlay');
        const audio = document.getElementById('bgAudio');
        const bannerVideo = document.getElementById('bannerVideo');
        const bannerImg = document.getElementById('bannerImg');
        const avatarVideo = document.getElementById('avatarVideo');
        const avatarImg = document.getElementById('avatarImg');
        const musicCover = document.getElementById('musicCover');
        const equalizer = document.getElementById('equalizer');
        const scrollIndicator = document.getElementById('scrollIndicator');

        // Fallback: video yoksa image göster (güçlendirilmiş)
        function showBannerImg() {
            bannerVideo.style.display = 'none';
            bannerImg.style.display = 'block';
        }
        function showAvatarImg() {
            avatarVideo.style.display = 'none';
            avatarImg.style.display = 'block';
        }

        bannerVideo.addEventListener('error', showBannerImg);
        avatarVideo.addEventListener('error', showAvatarImg);

        // Source elementi hata verirse de fallback
        const bannerSource = bannerVideo.querySelector('source');
        const avatarSource = avatarVideo.querySelector('source');
        if (bannerSource) bannerSource.addEventListener('error', showBannerImg);
        if (avatarSource) avatarSource.addEventListener('error', showAvatarImg);

        // Yedek: Sayfa yüklendikten 1 saniye sonra video hâlâ yüklenmediyse img göster
        setTimeout(function() {
            if (bannerVideo.readyState === 0) showBannerImg();
            if (avatarVideo.readyState === 0) showAvatarImg();
        }, 1000);

        // Music Player Controls
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const volumeSlider = document.getElementById('volumeSlider');
        const musicCover = document.getElementById('musicCover');
        const equalizer = document.getElementById('equalizer');

        let isPlaying = false;

        function formatTime(seconds) {
            if (isNaN(seconds)) return '00:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
        }

        playBtn.addEventListener('click', function() {
            if (isPlaying) {
                audio.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                musicCover.classList.remove('playing');
                equalizer.classList.remove('active');
            } else {
                audio.play();
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                musicCover.classList.add('playing');
                equalizer.classList.add('active');
            }
            isPlaying = !isPlaying;
        });

        audio.addEventListener('timeupdate', function() {
            if (audio.duration) {
                const progress = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = progress + '%';
                currentTimeEl.textContent = formatTime(audio.currentTime);
                durationEl.textContent = formatTime(audio.duration);
            }
        });

        audio.addEventListener('loadedmetadata', function() {
            durationEl.textContent = formatTime(audio.duration);
        });

        progressBar.addEventListener('click', function(e) {
            const rect = progressBar.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            if (audio.duration) {
                audio.currentTime = pos * audio.duration;
            }
        });

        volumeSlider.addEventListener('input', function() {
            audio.volume = this.value / 100;
        });

        // Set initial volume
        audio.volume = 0.5;

        // Music cover fallback
        musicCover.onerror = function() {
            this.style.background = '#1a1a1a';
        };

        // Click to reveal
        overlay.addEventListener('click', function() {
            overlay.classList.add('hidden');

            // Play background audio video
            audio.play().then(function() {
                isPlaying = true;
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                musicCover.classList.add('playing');
                equalizer.classList.add('active');
            }).catch(e => console.log('Autoplay blocked:', e));

            // Play banner video
            bannerVideo.muted = false;
            bannerVideo.play().catch(e => console.log('Banner video blocked:', e));

            // Play avatar video
            avatarVideo.muted = false;
            avatarVideo.play().catch(e => console.log('Avatar video blocked:', e));

            // Start cover spin
            musicCover.classList.add('playing');

            // Start equalizer
            equalizer.classList.add('active');
        });

        // Views counter
// Views counter
        const viewsEl = document.getElementById('views');
        const randomViews = Math.floor(Math.random() * 4000) + 200;
        viewsEl.textContent = randomViews + ' Views';

        // Music cover fallback
        musicCover.onerror = function() {
            this.style.background = '#1a1a1a';
        };

        // Hide scroll indicator on scroll
        window.addEventListener('scroll', function() {
            if (window.scrollY > 30) {
                scrollIndicator.style.opacity = '0';
            } else {
                scrollIndicator.style.opacity = '0.4';
            }
        });
    </script>
